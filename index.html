<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TQr - Experiencia Hilo Rojo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="screen1" class="container">
        <div class="date-header">18 / 03 / 2022</div>
        <div class="photo-frame">
            <img src="https://via.placeholder.com/400x400" alt="Pareja" id="mainPhoto">
        </div>
        <h1 class="couple-names">Greg & Cris</h1>
        <p class="legend-text">
            Dice una leyenda japonesa que dos personas destinadas a encontrarse están unidas por un <strong>hilo rojo invisible</strong>. 
            Puede estirarse o enredarse, pero nunca romperse.
        </p>
        <button id="btnDiscover">Descúbrelo</button>
    </section>

    <section id="screen2" class="container hidden">
        <div class="animation-wrapper">
            <div class="node left-node">TÚ</div>
            <div id="redThread"></div>
            <div class="node right-node">YO</div>
        </div>
    </section>

    <section id="screen3" class="container hidden">
        <div class="final-overlay">
            <h2>"Tenemos el amor más bonito"</h2>
            <p>Gracias por compartir tu vida conmigo ❤️</p>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
